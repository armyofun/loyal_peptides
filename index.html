<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyal Peptides — Inventory</title>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  #app { display: flex; min-height: 100vh; }
  #sidebar {
    width: var(--sidebar-w); background: var(--text); color: #fff;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh;
    z-index: 100; transition: transform .25s;
  }
  #sidebar .logo { padding: 16px; border-bottom: 1px solid #334155; }
  #sidebar .logo-inner { display: flex; align-items: center; gap: 10px; }
  #sidebar .logo-text { line-height: 1.15; }
  #sidebar .logo-text .t1 { font-size: 15px; font-weight: 800; letter-spacing: 1.5px; color: #fff; }
  #sidebar .logo-text .t2 { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; color: #94a3b8; text-transform: uppercase; }
  #sidebar .logo span { color: var(--primary); }
  #sidebar nav { flex: 1; padding: 8px 0; }
  #sidebar nav a {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    color: #94a3b8; text-decoration: none; font-size: 14px; transition: all .15s; cursor: pointer;
  }
  #sidebar nav a:hover, #sidebar nav a.active { color: #fff; background: #1e3a5f; }
  #sidebar nav a.active { border-left: 3px solid var(--primary); }
  #sidebar nav a .icon { font-size: 18px; width: 22px; text-align: center; }
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  #topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  #topbar h1 { font-size: 18px; font-weight: 600; }
  #menu-btn { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); }
  #content { padding: 24px; flex: 1; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card.primary .value { color: var(--primary); }
  .stat-card.success .value { color: var(--success); }
  .stat-card.warning .value { color: var(--warning); }
  .stat-card.danger .value { color: var(--danger); }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; background: var(--bg); font-weight: 600; font-size: 12px;
       text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge.green { background: #d1fae5; color: #065f46; }
  .badge.red { background: #fee2e2; color: #991b1b; }
  .badge.yellow { background: #fef3c7; color: #92400e; }
  .badge.blue { background: #dbeafe; color: #1e40af; }
  .badge.gray { background: #f1f5f9; color: #475569; }
  .badge.purple { background: #ede9fe; color: #5b21b6; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px;
         font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #059669; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Forms */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  input, select, textarea {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
    font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text);
    transition: border .15s; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px #3b82f620; }
  textarea { resize: vertical; min-height: 80px; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .toolbar .search { flex: 1; min-width: 200px; }
  .toolbar input { margin: 0; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: #00000060; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--surface); border-radius: 12px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 18px; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer;
         border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab:hover { color: var(--text); }

  /* Section header */
  .section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .section-hdr h2 { font-size: 16px; font-weight: 600; }

  /* Stock level indicator */
  .stock-bar { width: 70px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .stock-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty .icon { font-size: 40px; margin-bottom: 10px; }
  .empty p { font-size: 14px; }

  /* Mobile overlay */
  #overlay { display: none; position: fixed; inset: 0; background: #0006; z-index: 99; }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #overlay.show { display: block; }
    #main { margin-left: 0; }
    #menu-btn { display: block; }
    #content { padding: 16px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    table { font-size: 13px; }
    td, th { padding: 9px 8px; }
  }
  @media (max-width: 400px) {
    .stat-grid { grid-template-columns: 1fr 1fr; }
  }

  .hidden { display: none !important; }
  .text-muted { color: var(--text-muted); font-size: 13px; }
  .mt-16 { margin-top: 16px; }
  .gap-8 { gap: 8px; }

  /* PIN screen */
  #pin-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; }
  #pin-screen .pin-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:36px; width:100%; max-width:360px; text-align:center; }
  #pin-screen .pin-logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:24px; }
  #pin-screen h2 { font-size:18px; font-weight:700; margin-bottom:6px; }
  #pin-screen .pin-sub { color:var(--text-muted); font-size:13px; margin-bottom:24px; }
  #pin-screen .pin-error { color:var(--danger); font-size:13px; min-height:18px; margin-top:8px; }
  #pin-screen .pin-back { display:block; margin-top:16px; color:var(--text-muted); font-size:13px; text-decoration:none; }
  #pin-screen .pin-back:hover { color:var(--text); }

  /* Sync indicator */
  #sync-status { font-size:12px; font-weight:500; transition:color .3s; }
</style>

  closeMobileMenu();

}

// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmt(n, d=2) { return Number(n).toFixed(d); }
function fmtDate(d) { return d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'; }
function stockStatus(qty, reorder) {
  if (qty === 0) return ['Out of Stock','red'];
  if (qty <= reorder) return ['Low Stock','yellow'];
  return ['In Stock','green'];
}
function stockBarColor(qty, reorder) {
  if (qty === 0) return '#ef4444';
  if (qty <= reorder) return '#f59e0b';
  return '#10b981';
}
function orderStatusBadge(status) {
  const map = { pending:['Pending','yellow'], confirmed:['Confirmed','blue'], shipped:['Shipped','purple'], delivered:['Delivered','green'], cancelled:['Cancelled','red'] };
  return map[status] || [status, 'gray'];
}
function setContent(html, actions='') {
  $('content').innerHTML = html;
  $('topbar-actions').innerHTML = actions;
}
function openModal(html) {
  $('modal-container').innerHTML = `<div class="modal-bg" id="modal-bg">${html}</div>`;
  $('modal-bg').addEventListener('click', e => { if (e.target === $('modal-bg')) closeModal(); });
}
function closeModal() { $('modal-container').innerHTML = ''; }

// ── Dashboard ────────────────────────────────────────────────────────────────
function dashboard() {
  const products = DB.products();

  const orders = DB.orders();
  const today = new Date().toISOString().split('T')[0];

  const totalProducts = products.length;
  const outOfStock = products.filter(p => p.qty === 0).length;
  const lowStock = products.filter(p => p.qty > 0 && p.qty <= p.reorder).length;
  const totalValue = products.reduce((s,p) => s + p.qty * p.cost, 0);

  const recentTx = [...transactions].sort((a,b) => b.date.localeCompare(a.date)).slice(0,5);
  const pendingOrders = orders.filter(o => o.status === 'pending').length;
  const shippedSupplier = orders.filter(o => o.type === 'supplier' && o.status === 'shipped');
  const shippedSupplierCount = shippedSupplier.length;
  const shippedSupplierValue = shippedSupplier.reduce((s,o) => s + o.items.reduce((si,i) => si + i.qty * i.price, 0), 0);

  const txRows = recentTx.map(t => `
    <tr>

  const alertItems = products.filter(p => p.qty <= p.reorder).sort((a,b) => a.qty - b.qty).slice(0,5);
  const alertRows = alertItems.map(p => {
    const [label, color] = stockStatus(p.qty, p.reorder);
    return `<tr>
      <td>${esc(p.name)}</td>
      <td>${esc(p.sku)}</td>
      <td><span class="badge ${color}">${label}</span></td>
      <td>${p.qty} / ${p.reorder}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="4"><div class="empty"><p>All items well stocked ✓</p></div></td></tr>`;

  setContent(`
    <div class="stat-grid">
      <div class="stat-card primary"><div class="label">Total Products</div><div class="value">${totalProducts}</div></div>
      <div class="stat-card danger"><div class="label">Out of Stock</div><div class="value">${outOfStock}</div></div>
      <div class="stat-card warning"><div class="label">Low Stock</div><div class="value">${lowStock}</div></div>
      <div class="stat-card success"><div class="label">Inventory Value</div><div class="value">$${fmt(totalValue)}</div></div>
      <div class="stat-card blue" style="--blue:#3b82f6"><div class="label">Pending Orders</div><div class="value" style="color:#3b82f6">${pendingOrders}</div></div>
      <div class="stat-card" style="--blue:#8b5cf6"><div class="label">Shipped Supplier Orders</div><div class="value" style="color:#8b5cf6">${shippedSupplierCount}</div></div>
      <div class="stat-card" style="--blue:#8b5cf6"><div class="label">Shipped Supplier Value</div><div class="value" style="color:#8b5cf6">$${fmt(shippedSupplierValue)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px">
      <div class="card">
        <div class="section-hdr"><h2>Recent Transactions</h2></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Date</th><th>Product</th><th>Type</th><th>Qty</th><th>Ref</th></tr></thead>
          <tbody>${txRows}</tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="section-hdr"><h2>Stock Alerts</h2></div>

// ── Inventory ────────────────────────────────────────────────────────────────
let _invSort = { col: 'name', dir: 1 };

function invSortBy(col) {
  if (_invSort.col === col) _invSort.dir *= -1;
  else _invSort = { col, dir: 1 };
  inventory(document.getElementById('inv-search')?.value || '');
}

function inventory(filter='') {
  let products = DB.products();
  if (filter) {
    const q = filter.toLowerCase();
    products = products.filter(p =>
      p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || p.category.toLowerCase().includes(q)
    );
  }

  const { col, dir } = _invSort;
  products.sort((a, b) => {
    let av, bv;
    if (col === 'name') { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    else if (col === 'sku') { av = a.sku.toLowerCase(); bv = b.sku.toLowerCase(); }
    else if (col === 'qty') { av = a.qty; bv = b.qty; }
    else if (col === 'cost') { av = a.cost; bv = b.cost; }
    else if (col === 'price') { av = a.price; bv = b.price; }
    else if (col === 'fff') { av = a.fff_price; bv = b.fff_price; }
    else if (col === 'singles_us') { av = a.singles_price_us; bv = b.singles_price_us; }
    else if (col === 'kit') { av = a.kit_price; bv = b.kit_price; }
    else if (col === 'status') { av = stockStatus(a.qty, a.reorder)[0]; bv = stockStatus(b.qty, b.reorder)[0]; }
    else { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    if (av < bv) return -dir;
    if (av > bv) return dir;
    return 0;
  });

  const arrow = c => _invSort.col === c ? (_invSort.dir === 1 ? ' ▲' : ' ▼') : ' ⇅';
  const th = (label, c) => `<th style="cursor:pointer;user-select:none" onclick="invSortBy('${c}')">${label}<span style="opacity:${_invSort.col===c?1:0.3};font-size:10px">${arrow(c)}</span></th>`;

  // Build on-order totals dynamically from open supplier orders
  const openOrders = DB.orders().filter(o => o.type === 'supplier' && !['pending','delivered'].includes(o.status));
  const onOrderBySku = {};
  openOrders.forEach(o => (o.items||[]).forEach(item => {
    onOrderBySku[item.sku] = (onOrderBySku[item.sku] || 0) + (item.qty || 0);
  }));

  const rows = products.map(p => {
    const [label, color] = stockStatus(p.qty, p.reorder);
    const pct = Math.min(100, p.reorder > 0 ? (p.qty / (p.reorder * 3)) * 100 : 100);
    const barColor = stockBarColor(p.qty, p.reorder);
    const splitParts = [];
    if ((p.qty_john||0) > 0) splitParts.push(`J:${p.qty_john}`);
    if ((p.qty_ramon||0) > 0) splitParts.push(`R:${p.qty_ramon}`);
    const splitLabel = splitParts.length ? splitParts.join(' / ') : '—';
    const onOrder = onOrderBySku[p.sku] || 0;
    const ordLabel = onOrder > 0 ? `<span class="badge blue" style="font-size:11px">${onOrder} on order</span>` : '';
    return `<tr>
      <td><strong>${esc(p.name)}</strong></td>
      <td class="text-muted">${esc(p.sku)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <strong>${p.qty}</strong>
          <div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        </div>
        ${ordLabel}
      </td>
      <td class="text-muted" style="font-size:13px">${splitLabel}</td>
      <td><span class="badge ${color}">${label}</span></td>
      <td class="text-muted">$${fmt(p.cost)}</td>
      <td class="text-muted">${p.price > 0 ? '$'+fmt(p.price) : '—'}</td>
      <td class="text-muted">${p.fff_price > 0 ? '$'+fmt(p.fff_price) : '—'}</td>
      <td class="text-muted">${p.singles_price_us > 0 ? '$'+fmt(p.singles_price_us) : '—'}</td>
      <td class="text-muted">${p.kit_price > 0 ? '$'+fmt(p.kit_price) : '—'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="txModal(${p.id},'incoming')">+ In</button>
          <button class="btn btn-outline btn-sm" onclick="txModal(${p.id},'outgoing')">- Out</button>
          <button class="btn btn-outline btn-sm" onclick="editProduct(${p.id})">✏️</button>
          <button class="btn btn-outline btn-sm" style="color:var(--danger)" onclick="deleteProduct(${p.id})">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="11"><div class="empty"><div class="icon">📦</div><p>No products found</p></div></td></tr>`;

  setContent(`
    <div class="toolbar">
      <div class="search"><input type="text" id="inv-search" placeholder="Search by name, SKU, or category…" value="${esc(filter)}" oninput="inventory(this.value)"></div>
      <button class="btn btn-primary" onclick="addProduct()">+ Add Product</button>
    </div>
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr>${th('Name','name')}${th('SKU','sku')}${th('Qty / On Order','qty')}<th>John / Ramon</th>${th('Status','status')}${th('Avg Cost','cost')}${th('Price','price')}${th('F&F','fff')}${th('Singles (US)','singles_us')}${th('Kit Price','kit')}<th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `);
}

function saveProduct(id) {
  const name = $('f-name').value.trim();
  const sku = $('f-sku').value.trim();
  if (!name || !sku) { alert('Name and SKU are required.'); return; }
  const products = DB.products();
  const qjohn = Math.max(0, parseInt($('f-qjohn').value) || 0);
  const qramon = Math.max(0, parseInt($('f-qramon').value) || 0);
  const existingP = id ? DB.products().find(x => x.id === id) : null;
  const p = {
    id: id || DB.nextId(products),
    name, sku,
    category: $('f-cat').value.trim() || 'Peptides',
    unit: $('f-unit').value.trim() || 'vials',
    qty: Math.max(0, parseInt($('f-qty').value) || 0),
    reorder: Math.max(0, parseInt($('f-reorder').value) || 0),
    cost: parseFloat($('f-cost').value) || 0,
    price: parseFloat($('f-price').value) || 0,
    fff_price: parseFloat($('f-fff').value) || 0,
    singles_price_us: parseFloat($('f-singles').value) || 0,
    kit_price: parseFloat($('f-kit').value) || 0,
    qty_john: qjohn, qty_ramon: qramon,
    ord_john: existingP?.ord_john || 0, ord_ramon: existingP?.ord_ramon || 0,
  };
  if (id) {
    const i = products.findIndex(x => x.id === id);
    products[i] = p;
  } else {
    products.push(p);
  }
  DB.saveProducts(products);
  closeModal();
  inventory();
}

function deleteTx(id) {
  if (!confirm('Delete this transaction? The quantity change will be reversed.')) return;
  const txs = DB.transactions();
  const tx = txs.find(t => t.id === id);
  if (!tx) return;
  const products = DB.products();
  const p = products.find(x => x.id === tx.productId);
  if (p) {
    p.qty += tx.type === 'incoming' ? -tx.qty : tx.qty;
    DB.saveProducts(products);
  }
  DB.saveTransactions(txs.filter(t => t.id !== id));
  transactions();
}

function deleteProduct(id) {
  if (!confirm('Delete this product? This cannot be undone.')) return;
  DB.saveProducts(DB.products().filter(p => p.id !== id));
  inventory();
}

// ── Transactions ─────────────────────────────────────────────────────────────
function transactions(tab='all', filter='') {
  let txs = DB.transactions();
  if (tab !== 'all') txs = txs.filter(t => t.type === tab);
  if (filter) {
    const q = filter.toLowerCase();
    txs = txs.filter(t => t.productName.toLowerCase().includes(q) || (t.ref||'').toLowerCase().includes(q));
  }
  txs = [...txs].sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);

  const rows = txs.map(t => `<tr>
    <td>${fmtDate(t.date)}</td>
    <td>${esc(t.productName)}</td>
    <td><span class="badge ${t.type==='incoming'?'green':'red'}">${t.type==='incoming'?'▲ Incoming':'▼ Outgoing'}</span></td>
    <td><strong>${t.qty}</strong></td>
    <td class="text-muted">${esc(t.vendor||t.ref||'—')}</td>
    <td class="text-muted">${t.cost_each > 0 ? '$'+fmt(t.cost_each) : '—'}</td>
    <td class="text-muted">${t.shipping > 0 ? '$'+fmt(t.shipping) : '—'}</td>
    <td class="text-muted" style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.note||'—')}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-outline btn-sm" onclick="txModal(${t.productId},'${t.type}',${t.id})">✏️</button>
      <button class="btn btn-outline btn-sm" style="color:var(--danger)" onclick="deleteTx(${t.id})">🗑</button>
    </td>
  </tr>`).join('') || `<tr><td colspan="9"><div class="empty"><div class="icon">🔄</div><p>No transactions found</p></div></td></tr>`;

  setContent(`
    <div class="tabs">
      <div class="tab ${tab==='all'?'active':''}" onclick="transactions('all')">All</div>
      <div class="tab ${tab==='incoming'?'active':''}" onclick="transactions('incoming')">Incoming</div>
      <div class="tab ${tab==='outgoing'?'active':''}" onclick="transactions('outgoing')">Outgoing</div>
    </div>
    <div class="toolbar">
      <div class="search"><input type="text" placeholder="Search product or reference…" value="${esc(filter)}" oninput="transactions('${tab}',this.value)"></div>
      <button class="btn btn-success" onclick="txModal(null,'incoming')">+ Stock In</button>
      <button class="btn btn-danger" onclick="txModal(null,'outgoing')">- Stock Out</button>
    </div>
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Product</th><th>Type</th><th>Qty</th><th>Vendor / Ref</th><th>Each</th><th>Shipping</th><th>Note</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `);
}

function txModal(productId, type, txId=null) {
  const products = DB.products();
  const tx = txId ? DB.transactions().find(t => t.id === txId) : null;
  const selId = tx ? tx.productId : productId;
  const opts = products.map(p => `<option value="${p.id}" ${p.id===selId?'selected':''}>${esc(p.name)} (${esc(p.sku)})</option>`).join('');
  const today = new Date().toISOString().split('T')[0];
  const isEdit = !!tx;
  const t = tx || {};
  const typeLabel = type === 'incoming' ? 'Stock In (Incoming)' : 'Stock Out (Outgoing)';

  const incomingFields = type === 'incoming' ? `
    <div class="form-group"><label>Vendor</label><input id="tx-vendor" value="${esc(t.vendor||t.ref||'')}" placeholder="SAB, Legendary…"></div>
    <div class="form-group"><label>Total Cost ($)</label><input id="tx-cost-total" type="number" min="0" step="0.01" value="${t.cost_total||0}"></div>
    <div class="form-group"><label>Shipping ($)</label><input id="tx-shipping" type="number" min="0" step="0.01" value="${t.shipping||0}"></div>
    <div class="form-group"><label>Cost Each ($)</label><input id="tx-cost-each" type="number" min="0" step="0.01" value="${t.cost_each||0}"></div>` : `
    <div class="form-group"><label>Reference</label><input id="tx-ref" value="${esc(t.ref||t.vendor||'')}" placeholder="ORD-0001…"></div>`;

  openModal(`<div class="modal">
    <h2>${isEdit ? 'Edit ' : ''}${typeLabel}</h2>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Product *</label>
        <select id="tx-product"><option value="">Select product…</option>${opts}</select>
      </div>
      <div class="form-group"><label>Quantity *</label><input id="tx-qty" type="number" min="1" value="${t.qty||1}"></div>
      <div class="form-group"><label>Date</label><input id="tx-date" type="date" value="${t.date||today}"></div>
      ${incomingFields}
      <div class="form-group" style="grid-column:1/-1"><label>Note</label><textarea id="tx-note" rows="2" placeholder="Optional note…">${esc(t.note||'')}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn ${type==='incoming'?'btn-success':'btn-danger'}" onclick="saveTx('${type}',${txId||'null'})">${isEdit ? 'Update' : 'Confirm'}</button>
    </div>
  </div>`);
}

function saveTx(type, txId=null) {
  const productId = parseInt($('tx-product').value);
  const qty = parseInt($('tx-qty').value);
  if (!productId) { alert('Please select a product.'); return; }
  if (!qty || qty < 1) { alert('Quantity must be at least 1.'); return; }

  const products = DB.products();
  const txs = DB.transactions();

  if (txId) {
    // Edit: reverse old qty effect, apply new
    const old = txs.find(t => t.id === txId);
    if (old) {
      const oldProd = products.find(x => x.id === old.productId);
      if (oldProd) {
        oldProd.qty += old.type === 'incoming' ? -old.qty : old.qty;
      }
    }
  }

  const p = products.find(x => x.id === productId);
  if (!p) return;

  if (type === 'outgoing' && p.qty < qty) {
    if (!confirm(`Only ${p.qty} ${p.unit} in stock. Record outgoing of ${qty} anyway?`)) return;
  }

  p.qty = type === 'incoming' ? p.qty + qty : Math.max(0, p.qty - qty);
  DB.saveProducts(products);

  const record = {
    id: txId || DB.nextId(txs),
    productId, productName: p.name, type, qty,
    date: $('tx-date').value || new Date().toISOString().split('T')[0],
    note: $('tx-note').value.trim(),
  };

  if (type === 'incoming') {
    record.vendor = $('tx-vendor').value.trim();
    record.cost_total = parseFloat($('tx-cost-total').value) || 0;
    record.shipping = parseFloat($('tx-shipping').value) || 0;
    record.cost_each = parseFloat($('tx-cost-each').value) || 0;
  } else {
    record.ref = $('tx-ref').value.trim();
  }

  if (txId) {
    txs[txs.findIndex(t => t.id === txId)] = record;
  } else {
    txs.push(record);
  }
  DB.saveTransactions(txs);
  closeModal();
  if (currentView === 'transactions') transactions();
  else if (currentView === 'inventory') inventory();
  else dashboard();
}

function saveOrder(id) {
  const ref = $('o-ref').value.trim();
  const party = $('o-party').value.trim();
  if (!ref || !party) { alert('Reference and party are required.'); return; }

  const items = [];
  $('items-body').querySelectorAll('tr').forEach(row => {
    const ri = row.id.replace('item-row-','');
    const name = $(`item-name-${ri}`)?.value.trim();
    const skuSel = row.querySelector('select');
    const sku = skuSel?.value === '__custom__' ? '' : skuSel?.value || '';
    const qty = parseInt($(`item-qty-${ri}`)?.value) || 1;
    const price = parseFloat($(`item-price-${ri}`)?.value) || 0;
    if (name) items.push({ name, sku, qty, price });
  });
  if (!items.length) { alert('Add at least one item.'); return; }

  const ords = DB.orders();
  const o = {
    id: id || DB.nextId(ords),
    ref, party,
    type: $('o-type').value,
    date: $('o-date').value,
    status: $('o-status').value,
    notes: $('o-notes').value.trim(),
    items,
  };
  const prev = id ? ords.find(x => x.id === id) : null;
  const prevStatus = prev?.status;
  const newStatus = o.status;

  if (id) { ords[ords.findIndex(x => x.id === id)] = o; }
  else { ords.push(o); }
  DB.saveOrders(ords);

  // Sync inventory for customer orders when shipped status changes
  if (o.type === 'customer') {
    const wasShipped = prevStatus === 'shipped' || prevStatus === 'delivered';
    const isShipped  = newStatus  === 'shipped' || newStatus  === 'delivered';
    if (!wasShipped && isShipped) {
      // Deduct inventory
      const products = DB.products();
      o.items.forEach(item => {
        const p = products.find(x => x.sku === item.sku);
        if (p) p.qty = Math.max(0, p.qty - item.qty);
      });
      DB.saveProducts(products);
    } else if (wasShipped && !isShipped) {
      // Restore inventory
      const products = DB.products();
      o.items.forEach(item => {
        const p = products.find(x => x.sku === item.sku);
        if (p) p.qty += item.qty;
      });
      DB.saveProducts(products);
    }
  }

  closeModal();
  orders();
}

function deleteOrder(id) {
  if (!confirm('Delete this order?')) return;
  DB.saveOrders(DB.orders().filter(o => o.id !== id));
  orders();
}

// ── GitHub Sync ────────────────────────────────────────────────────────────────
const GH_REPO = 'armyofun/loyal_peptides';
const GH_FILE = 'index.html';
let _syncTimer = null;

function scheduleSyncToGitHub() {
  if (!sessionStorage.getItem('sf_admin')) return;
  clearTimeout(_syncTimer);
  setSyncStatus('pending');
  _syncTimer = setTimeout(syncToGitHub, 2500);
}

function setSyncStatus(s) {
  const el = $('sync-status');
  if (!el) return;
  const map = { pending:['● Pending','#f59e0b'], syncing:['↻ Syncing…','#3b82f6'], synced:['✓ Saved','#10b981'], error:['✗ Sync failed','#ef4444'], notoken:['⚠ No token — see Settings','#f59e0b'] };
  const [txt, col] = map[s] || ['',''];
  el.textContent = txt; el.style.color = col;
}

function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function fromBase64(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

async function syncToGitHub() {
  const token = localStorage.getItem('lp_gh_token');
  if (!token) { setSyncStatus('notoken'); return; }
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const current = fromBase64(data.content.replace(/\n/g, ''));
    const newContent = current.split('\n').map(line => {
      const t = line.trimStart();
      if (t.startsWith('const _P=')) return `const _P=${JSON.stringify(DB.products(), null, 0)};`;
      if (t.startsWith('const _T=')) return `const _T=${JSON.stringify(DB.transactions(), null, 0)};`;
      if (t.startsWith('const _O=')) return `const _O=${JSON.stringify(DB.orders(), null, 0)};`;
      if (t.startsWith('let ADMIN_PIN =')) return `let ADMIN_PIN = '${ADMIN_PIN}'; // sync-managed`;
      return line;
    }).join('\n');
    const put = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message: 'Update inventory data', content: toBase64(newContent), sha: data.sha })
    });
    if (!put.ok) { const e = await put.json(); throw new Error(e.message || put.status); }
    setSyncStatus('synced');
    setTimeout(() => setSyncStatus(''), 4000);
  } catch(e) {
    console.error('Sync failed:', e);
    setSyncStatus('error');
  }
}

  if (!t) { alert('Enter a token first.'); return; }
  const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, { headers: { Authorization: `Bearer ${t}` } });
  alert(res.ok ? '✓ Token works!' : `✗ Failed (${res.status}) — check the token has repo write access.`);
}

// ── Customer view ─────────────────────────────────────────────────────────────
let _cvSort = { col: 'name', dir: 1 };

function cvSortBy(col) {
  if (_cvSort.col === col) _cvSort.dir *= -1;
  else _cvSort = { col, dir: 1 };
  renderCustomerTable();
}

function renderCustomerTable() {
  const products = DB.products();
  const openOrders = DB.orders().filter(o => o.type === 'supplier' && !['pending','delivered'].includes(o.status));
  const onOrderBySku = {};
  openOrders.forEach(o => (o.items||[]).forEach(item => {
    onOrderBySku[item.sku] = (onOrderBySku[item.sku] || 0) + (item.qty || 0);
  }));

  const { col, dir } = _cvSort;
  const sorted = [...products].sort((a, b) => {
    let av, bv;
    if (col === 'name') { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    else if (col === 'sku') { av = a.sku.toLowerCase(); bv = b.sku.toLowerCase(); }
    else if (col === 'qty') { av = a.qty; bv = b.qty; }
    else if (col === 'status') { av = stockStatus(a.qty, a.reorder)[0]; bv = stockStatus(b.qty, b.reorder)[0]; }
    else if (col === 'singles') { av = a.singles_price_us || 0; bv = b.singles_price_us || 0; }
    else if (col === 'kit') { av = a.kit_price || 0; bv = b.kit_price || 0; }
    else { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    if (av < bv) return -dir;
    if (av > bv) return dir;
    return 0;
  });

  const arrow = c => _cvSort.col === c ? (_cvSort.dir === 1 ? ' ▲' : ' ▼') : ' ⇅';
  const th = (label, c) => `<th style="cursor:pointer;user-select:none" onclick="cvSortBy('${c}')">${label}<span style="opacity:${_cvSort.col===c?1:0.3};font-size:10px">${arrow(c)}</span></th>`;

  const rows = sorted.map(p => {
    const onOrder = onOrderBySku[p.sku] || 0;
    const [label, color] = stockStatus(p.qty, p.reorder);
    return `<tr>
      <td><strong>${esc(p.name)}</strong></td>
      <td class="text-muted">${esc(p.sku)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <strong>${p.qty}</strong>
          ${onOrder > 0 ? `<span class="badge blue" style="font-size:11px">${onOrder} on order</span>` : ''}
        </div>
      </td>
      <td><span class="badge ${color}">${label}</span></td>
      <td>${p.singles_price_us > 0 ? '<strong>$'+fmt(p.singles_price_us)+'</strong>' : '<span class="text-muted">—</span>'}</td>
      <td>${p.kit_price > 0 ? '<strong>$'+fmt(p.kit_price)+'</strong>' : '<span class="text-muted">—</span>'}</td>
    </tr>`;
  }).join('');

  const tbody = document.getElementById('cv-tbody');
  const thead = document.getElementById('cv-thead');
  if (tbody) tbody.innerHTML = rows;
  if (thead) thead.innerHTML = `<tr>${th('Name','name')}${th('SKU','sku')}${th('Qty / On Order','qty')}${th('Status','status')}${th('Singles (US)','singles')}${th('Kit Price (CO)','kit')}</tr>`;
}
